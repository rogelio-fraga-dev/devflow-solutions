# ==========================================
# CONEXÃO COM MYSQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/devflow_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=devflow_user
spring.datasource.password=devflow_senha123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HIBERNATE / JPA COM UPDATE PARA MANTER O ESQUEMA DO BANCO ATUALIZADO
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# ==========================================
# CONFIGURAÇÕES DA API E DATA
# ==========================================
server.port=8080
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================
# PERFORMANCE E BOAS PRÁTICAS REST
# ==========================================
# Desabilita o Open Session in View — evita queries durante renderização (ruim para REST)
spring.jpa.open-in-view=false

# ==========================================
# JWT SECRET (use variável de ambiente em produção)
# ==========================================
# Exemplo de uso: export API_SECURITY_TOKEN_SECRET=minha-chave-super-secreta
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:devflow-2026-chave-secreta-pi}